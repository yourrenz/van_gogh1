<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Gogh AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #ui-layer {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 1000;
            color: white;
            font-family: Arial, sans-serif;
            text-shadow: 2px 2px 4px #000000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <p>Kamerayı Yıldızlı Gece tablosuna tutun.<br><em>(Sesli videoların başlaması için ekrana bir kez dokunmanız gerekebilir)</em></p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vanGoghVideo" src="./van_gogh.mp4" webkit-playsinline playsinline loop crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#vanGoghVideo" position="0 0 0" width="1" height="0.75"></a-video>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const target = document.querySelector('#target');
            const video = document.querySelector('#vanGoghVideo');

            // Tarayıcıların "otomatik sesli video oynatma" (autoplay) kısıtlamasını aşmak için
            // kullanıcı ekrana herhangi bir yere dokunduğunda videoyu kısa süreliğine başlatıp durduruyoruz.
            window.addEventListener('click', () => {
                video.play();
                video.pause();
            }, { once: true }); // Sadece ilk tıklamada çalışsın

            // Kamera hedef resmi bulduğunda
            target.addEventListener("targetFound", () => {
                console.log("Resim bulundu, video başlatılıyor...");
                video.play();
            });

            // Kamera hedef resmi kaybettiğinde
            target.addEventListener("targetLost", () => {
                console.log("Resim kaybedildi, video durduruluyor...");
                video.pause();
            });
        });
    </script>
</body>
</html>
