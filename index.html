<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Gogh AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Ekranı tamamen kaplayan Başlangıç Kilidi */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #start-btn {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.5);
        }

        #debug-log {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 20%;
            background-color: rgba(0, 0, 0, 0.8); color: #00ff00;
            font-family: monospace; font-size: 12px; padding: 10px;
            box-sizing: border-box; overflow-y: auto; z-index: 9000;
        }
    </style>
</head>
<body>
    
    <div id="start-overlay">
        <h2>Van Gogh AR Deneyimi</h2>
        <p>Kameraya izin verin ve tabloyu taratın.</p>
        <button id="start-btn">DENEYİMİ BAŞLAT</button>
    </div>

    <div id="debug-log">
        [SİSTEM] Başlangıç bekleniyor...<br>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./van_gogh.mp4" webkit-playsinline playsinline loop crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="hedef" mindar-image-target="targetIndex: 0">
            <a-plane src="#vid" position="0 0 0" width="1" height="0.75" material="shader: flat; transparent: false;"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        const logBox = document.getElementById('debug-log');
        const video = document.getElementById('vid');
        const hedef = document.getElementById('hedef');
        const startBtn = document.getElementById('start-btn');
        const startOverlay = document.getElementById('start-overlay');
        const scene = document.querySelector('a-scene');

        function logMesaji(mesaj, renk = "#00ff00") {
            logBox.innerHTML += `<span style="color:${renk};">${mesaj}</span><br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        document.addEventListener("DOMContentLoaded", () => {
            
            // Kullanıcı "BAŞLAT" butonuna tıkladığında
            startBtn.addEventListener('click', () => {
                logMesaji("[SİSTEM] Butona tıklandı. Kilit açılıyor...");
                
                // Tarayıcının video kısıtlamasını kökünden çözmek için videoyu 1 saliseliğine oynatıp durduruyoruz
                video.muted = false; // Ses kilidini aç
                video.play().then(() => {
                    video.pause();
                    logMesaji("[SİSTEM] Video kilidi başarıyla kırıldı!");
                }).catch(e => {
                    logMesaji("[UYARI] Kilit açılırken hata: " + e.message, "orange");
                });

                // Başlangıç ekranını gizle
                startOverlay.style.display = 'none';

                // AR Motorunu çalıştır
                scene.systems["mindar-image-system"].start();
                logMesaji("[KAMERA] AR motoru başlatıldı. Tablo aranıyor...");
            });

            // Resim bulunduğunda
            hedef.addEventListener("targetFound", () => {
                logMesaji("[KAMERA] Yıldızlı Gece tablosu EŞLEŞTİ!", "#ffff00");
                video.play().then(() => {
                    logMesaji("[BAŞARI] Video sahnede oynatılıyor!", "#00ffff");
                }).catch((error) => {
                    logMesaji(`[HATA] Video oynatılamadı: ${error.message}`, "red");
                });
            });

            // Resim kaybedildiğinde
            hedef.addEventListener("targetLost", () => {
                logMesaji("[KAMERA] Tablo kaybedildi, video duraklatıldı.", "orange");
                video.pause();
            });
        });
    </script>
</body>
</html>
