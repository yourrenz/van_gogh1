<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Gogh AR</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        
        #guncel-uyari {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #00ff00; font-weight: bold; font-size: 18px; z-index: 9999;
            text-shadow: 2px 2px 4px black; pointer-events: none;
        }

        #baslat-ekrani {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); z-index: 9000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #baslat-btn {
            background-color: #ffcc00; color: #000; border: none; padding: 15px 40px;
            font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>
    
    <div id="guncel-uyari">GÜNCEL SÜRÜM BAŞARILI!</div>

    <div id="baslat-ekrani">
        <button id="baslat-btn">KAMERAYI AÇ VE BAŞLA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="van_gogh.mp4" webkit-playsinline playsinline loop muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="hedef" mindar-image-target="targetIndex: 0">
            <a-plane src="#vid" position="0 0 0" width="1" height="0.75" material="transparent: false;"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const hedef = document.querySelector('#hedef');
            const video = document.querySelector('#vid');
            const baslatEkrani = document.querySelector('#baslat-ekrani');
            const baslatBtn = document.querySelector('#baslat-btn');

            baslatBtn.addEventListener('click', () => {
                // Siyah ekranı gizle ve videonun sesini açmaya hazırlan
                baslatEkrani.style.display = 'none';
                video.muted = false;
            });

            hedef.addEventListener("targetFound", () => {
                video.play();
            });

            hedef.addEventListener("targetLost", () => {
                video.pause();
            });
        });
    </script>
</body>
</html>
