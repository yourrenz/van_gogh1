<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Gogh AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        
        #bilgi-ekrani {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 16px;
            font-family: Arial, sans-serif;
            z-index: 999;
            text-shadow: 2px 2px 4px black;
            pointer-events: none;
        }
    </style>
</head>
<body>
    
    <div id="bilgi-ekrani">Kamerayı Yıldızlı Gece tablosuna tutun.<br>(Ses için ekrana bir kez dokunun)</div>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="van_gogh.mp4" webkit-playsinline playsinline loop muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="hedef" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" position="0 0 0" width="1" height="0.75"></a-video>
        </a-entity>
        
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const hedef = document.querySelector('#hedef');
            const video = document.querySelector('#vid');
            const bilgiEkrani = document.querySelector('#bilgi-ekrani');

            // Ekrana tıklandığında videonun sesini aç
            window.addEventListener('click', () => {
                if(video.muted) {
                    video.muted = false;
                }
            });

            // Kamera yildizligece.jpeg hedefini (targets.mind üzerinden) bulduğunda
            hedef.addEventListener("targetFound", () => {
                bilgiEkrani.style.display = 'none'; // Yazıyı gizle
                video.play();                       // Videoyu oynat
            });

            // Kamera hedefi kaybettiğinde
            hedef.addEventListener("targetLost", () => {
                bilgiEkrani.style.display = 'block'; // Yazıyı tekrar göster
                video.pause();                       // Videoyu durdur
            });
        });
    </script>
</body>
</html>
