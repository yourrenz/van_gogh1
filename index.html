<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Gogh AR - Test Aşaması</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        #debug-log {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30%;
            background-color: rgba(0, 0, 0, 0.9); color: #00ff00;
            font-family: monospace; font-size: 14px; padding: 10px;
            box-sizing: border-box; overflow-y: auto; z-index: 9999;
        }
    </style>
</head>
<body>
    
    <div id="debug-log">
        [SİSTEM] Dışarıdan video çekme testi başlatıldı...<br>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" crossorigin="anonymous" webkit-playsinline playsinline loop muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="hedef" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" position="0 0 0" width="1" height="0.75"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const logBox = document.getElementById('debug-log');
        const video = document.getElementById('vid');
        const hedef = document.getElementById('hedef');

        function logMesaji(mesaj, renk = "#00ff00") {
            logBox.innerHTML += `<span style="color:${renk};">${mesaj}</span><br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        document.addEventListener("DOMContentLoaded", () => {
            logMesaji("[SİSTEM] İnternet videosu bekleniyor...");

            hedef.addEventListener("targetFound", () => {
                logMesaji("[KAMERA] Yıldızlı Gece tablosu TANINDI!", "#ffff00");
                video.play().then(() => {
                    logMesaji("[BAŞARI] İnternet videosu başarıyla oynatılıyor!", "#00ffff");
                }).catch((error) => {
                    logMesaji(`[HATA] Video başlatılamadı: ${error.message}`, "red");
                });
            });

            hedef.addEventListener("targetLost", () => {
                logMesaji("[KAMERA] Tablo kaybedildi, video durdu.", "orange");
                video.pause();
            });
        });
    </script>
</body>
</html>
